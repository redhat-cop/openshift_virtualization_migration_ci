name: Secrets stage

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: true
        description: "Reference used on checkout code"
      repo:
        type: string
        required: true
        description: "Repository used on checkout code"

jobs:
  secret-detection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Important: Gitleaks needs history to scan commits
          ref: ${{ inputs.ref }}
          repository: ${{ inputs.repo }}
      - name: Secrets | secret_detection (1/2)
        id: secret_detection
        uses: redhat-cop/openshift_virtualization_migration_ci/.github/actions/secret-detection@main
      - name: Secrets | secret_detection (2/2)
        uses: actions/upload-artifact@v4
        if: always() && steps.secret_detection.outcome != 'skipped'
        with:
          name: secret_detection
          path: secret-detection-report.json
          if-no-files-found: error

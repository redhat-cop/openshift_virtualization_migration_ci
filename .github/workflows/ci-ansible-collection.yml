name: CI workflow for releasing and publishing of Ansible collections

on:
  workflow_call:
    inputs:
      trigger_release:
        type: boolean
        required: false
        default: false
        description: 'Allow to trigger release with workflow_dispatch on default branch'
      auto_merge:
        type: boolean
        required: false
        default: false
        description: 'Enable auto-merge for release PR (squash merge)'
      target_branch:
        type: string
        required: false
        default: "main"
        description: "The primary branch used for releases (e.g., main or master)"
      ref:
        type: string
        required: true
        description: "Reference used on checkout code"
      repo:
        type: string
        required: true
        description: "Repository used on checkout code"
      image:
        type: string
        required: false
        default: "ghcr.io/redhat-cop/openshift_virtualization_migration_ci/ci-python-env:latest"
        description: "Container image including CI tooling"
      test_requirements:
        type: string
        required: false
        default: "test-requirements.txt"
        description: "Python packages required for testing"
      ansible_requirements:
        type: string
        required: false
        default: "requirements-dev.yml"
        description: "Ansible collections dependencies"
      tox_config_file:
        type: string
        required: false
        default: "tox-ansible.ini"
        description: "Tox Ansible configuration file"
      automation_hub_url:
        type: string
        required: false
        default: 'https://console.redhat.com/api/automation-hub/'
        description: 'The API URL for the Automation Hub'
      automation_hub_repository:
        type: string
        required: false
        default: 'staging'
        description: 'The target repository to publish the collection in the Automation Hub'
      publish_to_automation_hub:
        type: boolean
        required: false
        default: false
        description: 'Whether to publish the collection to the Automation Hub'
    secrets:
      automation_hub_token:
        required: true
        description: 'The Authentication Token for the Automation Hub'
      release_app_id:
        required: false
        description: 'App ID of GitHub App used to push commits to default branch'
      release_app_private_key:
        required: false
        description: 'Private key of GitHub App used to push commits to default branch'

# default: least privileged permissions across all jobs
permissions:
  actions: none
  contents: read
  packages: read
  security-events: none

jobs:
  detect-context:
    runs-on: ubuntu-latest
    outputs:
      is_release_commit: ${{ steps.check.outputs.is_release_commit }}
      release_version: ${{ steps.check.outputs.release_version }}
    steps:
      - name: Detect release commit
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Check if commit message matches release pattern
          # Format: chore(release): 1.2.3
          if [[ "$COMMIT_MSG" =~ ^chore\(release\):\ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "is_release_commit=true" >> $GITHUB_OUTPUT
            echo "release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "✅ Detected release commit for version: $VERSION"
          else
            echo "is_release_commit=false" >> $GITHUB_OUTPUT
            echo "ℹ️  Not a release commit"
          fi

  secrets:
    uses: redhat-cop/openshift_virtualization_migration_ci/.github/workflows/_secrets-stage.yml@v2
    with:
      ref: ${{ inputs.ref }}
      repo: ${{ inputs.repo }}

  prepare:
    needs: secrets 
    uses: redhat-cop/openshift_virtualization_migration_ci/.github/workflows/_prepare-stage.yml@v2
    with:
      image: ${{ inputs.image }}
      automation_hub_url: ${{ inputs.automation_hub_url }}
    secrets:
      automation_hub_token: ${{ secrets.automation_hub_token }}

  test:
    needs: prepare
    uses: redhat-cop/openshift_virtualization_migration_ci/.github/workflows/_test-stage.yml@v2
    permissions:
      contents: read
      packages: read
      security-events: write
      actions: read
    with:
      ref: ${{ inputs.ref }}
      repo: ${{ inputs.repo }}
      image: ${{ inputs.image }}
      test_requirements: ${{ inputs.test_requirements}}
      ansible_requirements: ${{ inputs.ansible_requirements }}
      tox_config_file: ${{ inputs.tox_config_file }}
      automation_hub_url: ${{ inputs.automation_hub_url }}
      lint_profile: "production"
      lint_strict: true
      lint_sarif_file: true
    secrets:
      automation_hub_token: ${{ secrets.automation_hub_token }}

  report:
    needs: test
    uses: redhat-cop/openshift_virtualization_migration_ci/.github/workflows/_report-stage.yml@v2
    with:
      image: ${{ inputs.image }}

  release:
    if: |
      inputs.trigger_release ||
      ((github.event_name == 'pull_request' || github.event_name == 'pull_request_target') &&
       github.base_ref == inputs.target_branch)
    needs: report
    uses: redhat-cop/openshift_virtualization_migration_ci/.github/workflows/_release-stage.yml@v2
    permissions:
      contents: write
      packages: read
      pull-requests: write
    with:
      target_branch: ${{ inputs.target_branch }}
      image: ${{ inputs.image }}
      dry_run: ${{ !inputs.trigger_release }}
      auto_merge: ${{ inputs.auto_merge }}
    secrets:
      release_app_id: ${{ secrets.release_app_id }}
      release_app_private_key: ${{ secrets.release_app_private_key }}

  publish:
    if: |
      github.event_name == 'push' &&
      github.ref == format('refs/heads/{0}', inputs.target_branch) &&
      needs.detect-context.outputs.is_release_commit == 'true'
    needs: [detect-context, test, report]
    uses: redhat-cop/openshift_virtualization_migration_ci/.github/workflows/_publish-stage.yml@v2
    permissions:
      contents: write
      packages: read
    with:
      image: ${{ inputs.image }}
      release_version: ${{ needs.detect-context.outputs.release_version }}
      target_branch: ${{ inputs.target_branch }}
      publish_to_automation_hub: ${{ inputs.publish_to_automation_hub }}
      automation_hub_url: ${{ inputs.automation_hub_url }}
    secrets:
      automation_hub_token: ${{ secrets.automation_hub_token }}

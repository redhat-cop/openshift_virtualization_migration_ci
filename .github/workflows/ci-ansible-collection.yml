name: CI for Ansible Collections

on:
  workflow_call:
    inputs:
      image:
        type: string
        required: false
        default: 'ghcr.io/open-appdev-lab/ansible-collections-ci/ci-python-env:latest'
      test_requirements:
        type: string
        required: false
        default: "test-requirements.txt"
      ansible_requirements:
        type: string
        required: false
        default: "requirements-dev.yml"
      automation_hub_url:
        required: false
        type: string
        default: 'https://console.redhat.com/api/automation-hub/'
        description: 'The API URL for the Automation Hub'
      # dry_run:
      #   description: "Dry Run (Simulate release without pushing)"
      #   type: boolean
      #   default: true
    secrets:
      automation_hub_token:
        required: true
        description: 'The Authentication Token for the Automation Hub'

concurrency:
  # Group by the branch/ref name. 
  # This ensures PRs don't block Main, and Main merges run one-by-one.
  group: ${{ github.workflow }}-${{ github.ref }}
  # For main branch, we set this to false to ensure releases finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

  # default: least privileged permissions across all jobs
permissions:
  contents: read
  packages: read

jobs:
  secrets:
    uses: open-appdev-lab/ansible-collections-ci/.github/workflows/_secrets-stage.yml@main

  prepare:
    needs: secrets 
    uses: open-appdev-lab/ansible-collections-ci/.github/workflows/_prepare-stage.yml@main
    with:
      image: ${{ inputs.image }}
      ansible_requirements: ${{ inputs.ansible_requirements }}
      automation_hub_url: ${{ inputs.automation_hub_url }}
    secrets:
      automation_hub_token: ${{ secrets.AUTOMATION_HUB_TOKEN }}

  test:
    needs: prepare
    uses: open-appdev-lab/ansible-collections-ci/.github/workflows/_test-stage.yml@main
    with:
      image: ${{ inputs.image }}
      test_requirements: ${{ inputs.test_requirements}}
      automation_hub_url: ${{ inputs.automation_hub_url }}
    secrets:
      automation_hub_token: ${{ secrets.AUTOMATION_HUB_TOKEN }}

  report:
    needs: test
    uses: open-appdev-lab/ansible-collections-ci/.github/workflows/_report-stage.yml@main
    with:
      image: ${{ inputs.image }}

  release:
    if: github.ref == 'refs/heads/main'
    needs: report
    uses: open-appdev-lab/ansible-collections-ci/.github/workflows/_release-stage.yml@main
    permissions:
      contents: write
      packages: read
    with:
      image: ${{ inputs.image }}
      dry_run: ${{ github.event_name == 'pull_request' }}

  publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release.outputs.released == 'true'
    needs: release
    uses: open-appdev-lab/ansible-collections-ci/.github/workflows/_publish-stage.yml@main
    permissions:
      contents: write
      packages: read
    with:
      image: ${{ inputs.image }}
      tag_name: ${{ needs.release.outputs.new_version }}
      automation_hub_url: ${{ inputs.automation_hub_url }}
    secrets:
      automation_hub_token: ${{ secrets.AUTOMATION_HUB_TOKEN }}

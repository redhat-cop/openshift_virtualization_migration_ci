name: Prepare stage

on:
  workflow_call:
    inputs:
      image:
        type: string
        required: true
        description: "Container image including CI tooling"
      ansible_requirements:
        type: string
        required: true
        description: "Ansible collections dependencies"
      automation_hub_url:
        type: string
        required: true
        description: 'The API URL for the Automation Hub'
        
    secrets:
      automation_hub_token:
        required: true
        description: 'The Authentication Token for the Hub'
    outputs:
      next_version:
        description: "The version number generated"
        value: ${{ jobs.semver-next.outputs.next_version }}

jobs:
  semver-next:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      next_version: ${{ steps.semver-next.outputs.next_version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    # ONLY needed for PRs to fix the Detached HEAD error for python-semantic release
    - name: Attach to Branch (Fix Detached HEAD)
      if: github.event_name == 'pull_request'
      run: |
        git config --global --add safe.directory .
        git checkout -B ${{ github.head_ref }}
    - name: Prepare | semver-next
      id: semver-next
      run: |
        git config --global --add safe.directory .

        LAST_VERSION=$(semantic-release version --print-last-released)
        NEXT_VERSION=$(semantic-release version --print)

        echo "LAST_VERSION=$LAST_VERSION" >> $GITHUB_ENV
        echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

        if [ "$LAST_VERSION" != "$NEXT_VERSION" ]; then
          echo "🚀 A new version will be created: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
        else
          echo "💤 No release needed. Version remains: $LAST_VERSION"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ansible-validate-tokens:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    # - uses: actions/checkout@v4

    - name: Prepare | ansible-validate-tokens
      id: ansible-validate-tokens
      env:
          AUTOMATION_HUB_URL: ${{ inputs.automation_hub_url }}
          AUTOMATION_HUB_TOKEN: ${{ secrets.automation_hub_token }}
      run: |

        echo "Starting Token Validation..."
        
        if [[ -z "${AUTOMATION_HUB_TOKEN}" ]]; then
          echo "AUTOMATION_HUB_TOKEN is not defined. Exiting"
          exit 1
        fi

        echo "Starting Token Validation..."
                  
        # DETECT HUB TYPE BASED ON URL
        if [[ "$AUTOMATION_HUB_URL" == *"console.redhat.com"* ]]; then
            echo "Type: Red Hat SaaS (console.redhat.com)"
            echo "Action: Verifying Offline Token via SSO exchange..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token \
                -d grant_type=refresh_token \
                -d client_id="cloud-services" \
                -d refresh_token="$AUTOMATION_HUB_TOKEN")
                
            if [[ "$HTTP_CODE" == "200" ]]; then
                echo "✅ Success: Red Hat Offline Token is valid."
            else
                echo "❌ Error: Token rejected by Red Hat SSO (HTTP $HTTP_CODE)."
                exit 1
            fi

        else
            echo "Type: Private Automation Hub (On-Premise)"
            echo "Action: Verifying Bearer Token against $AUTOMATION_HUB_URL..."

            # Ensure URL ends with / if not present (simple cleanup)
            BASE_URL="${AUTOMATION_HUB_URL%/}"
                      
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer $AUTOMATION_HUB_TOKEN" \
                "$BASE_URL/v3/namespaces/?limit=1")
          
            if [[ "$HTTP_CODE" == "200" ]]; then
                echo "✅ Success: Private Hub Token is valid."
            elif [[ "$HTTP_CODE" == "401" ]] || [[ "$HTTP_CODE" == "403" ]]; then
                echo "❌ Error: Unauthorized. Check your Private Hub Token (HTTP $HTTP_CODE)."
                exit 1
            else
                echo "⚠️ Warning: Received HTTP $HTTP_CODE."
                echo "Expected 200 OK from $BASE_URL/v3/namespaces/"
                exit 1
            fi
        fi

  ansible-collection-install:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v4

    - name: Prepare | ansible-collection-install (1/2)
      id: ansible-collection-install
      env:
          ANSIBLE_GALAXY_SERVER_LIST: automation_hub,upstream_galaxy
          ANSIBLE_GALAXY_SERVER_UPSTREAM_GALAXY_URL: https://galaxy.ansible.com/
          ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_URL: ${{ inputs.automation_hub_url }}
          ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_TOKEN: ${{ secrets.automation_hub_token }}
      run: |
        if [[ "$ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_URL" == *"console.redhat.com"* ]]; then
            export ANSIBLE_GALAXY_SERVER_AUTOMATION_HUB_AUTH_URL=https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
        fi
        ANSIBLE_COLLECTIONS_PATH=.ansible/collections
        echo "Install collection dependencies"
        ansible-galaxy collection install --force -p .ansible/collections -r ${{ inputs.ansible_requirements }} || RETURN=$?
        if [[ 0 == $RETURN ]]; then
          echo "Return code $RETURN matches expected return"
          exit 0
        fi
        exit $RETURN

    - name: Prepare | ansible-collection-install (2/2)
      uses: actions/upload-artifact@v4
      if: always() && steps.ansible-collection-install.outcome != 'skipped'
      with:
        name: local-ansible-collections
        path: .ansible/
        if-no-files-found: error
        include-hidden-files: true

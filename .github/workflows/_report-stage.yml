name: Report stage

on:
  workflow_call:
    inputs:
      image:
        type: string
        required: true
        description: "Container image including CI tooling"

jobs:
  ansible-codeclimate:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v6

    - name: Report | ansible-codeclimate (1/3)
      uses: actions/download-artifact@v4
      with:
        name: ansible-lint

    - name: Report | ansible-codeclimate (2/3)
      id: ansible-codeclimate
      env:
        SARIF_REPORT_FULL_PATH: "./code-quality-report.sarif"
      run: |
        if [[ -f ${SARIF_REPORT_FULL_PATH} ]]
        then
          sarif codeclimate ${SARIF_REPORT_FULL_PATH} || RETURN=$?
        else
          echo "❌ Error: File not found ${SARIF_REPORT_FULL_PATH}"
          exit 1
        fi
        if [[ 0 == $RETURN ]]; then echo "Return code $RETURN matches expected return"; exit 0; fi
        exit $RETURN

    - name: Report | ansible-codeclimate  (3/3)
      uses: actions/upload-artifact@v7
      if: always() && steps.ansible-codeclimate.outcome != 'skipped'
      with:
        name: ansible-codeclimate
        path: code-quality-report.json
        if-no-files-found: error

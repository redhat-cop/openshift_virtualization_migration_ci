name: Test stage

on:
  workflow_call:
    inputs:
      image:
        type: string
        required: true
      test_requirements:
        type: string
        required: true
      automation_hub_url:
        type: string
        required: true
        description: 'The API URL for the Automation Hub'
        
    secrets:
      automation_hub_token:
        required: true
        description: 'The Authentication Token for the Hub'

jobs:
  # secret_detection:
  #   runs-on: ubuntu-latest
